plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.webview_webrtc_app"
    compileSdk 36 // <-- Đã đổi từ 34 lên 36

    defaultConfig {
        applicationId "com.example.webview_webrtc_app"
        minSdk 21
        targetSdk 36 // <-- Đã đổi lên 36
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source "../.."
}
